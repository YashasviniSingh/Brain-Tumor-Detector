<!DOCTYPE html>
<html>
<head>
    <title>Brain Tumor Detection</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-bottom: 20px;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .upload-box {
            display: inline-block;
            padding: 12px 20px;
            background: #ffffff20;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .upload-box:hover {
            background: #ffffff40;
        }

        .upload-box input {
            display: none;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            color: black;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        button:hover {
            background: #0072ff;
            color: white;
            transform: scale(1.05);
        }

        #preview {
            margin-top: 15px;
            border-radius: 10px;
            display: none;
            border: 2px solid white;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.7;
        }

        #loading {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🧠 Brain Tumor Detection</h1>

    <form action="/predict" method="post" enctype="multipart/form-data">

        <label class="upload-box">
            📁 Choose MRI Image
            <input type="file" name="file" accept="image/*" required onchange="previewImage(event)">
        </label>

        <br>

        <img id="preview" width="200"/>

        <br>

        <button type="submit" onclick="showLoading()">🚀 Predict</button>

    </form>

    <div id="loading">⏳ Processing...</div>

    <div class="footer">
        ⚠️ For best results, use clear MRI brain scans
    </div>

</div>

<script>
function previewImage(event) {
    const file = event.target.files[0];
    const preview = document.getElementById('preview');

    if(file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
}

function showLoading(){
    document.getElementById("loading").style.display = "block";
}
</script>

</body>
</html>
